services:
  app:
    build:
      context: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
      - meilisearch

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build:
      context: .
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
      - meilisearch

  scheduler:
    build:
      context: .
    restart: unless-stopped
    command: sh -c 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
      - meilisearch

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  meilisearch:
    image: ${MEILISEARCH_IMAGE:-getmeili/meilisearch:latest}
    restart: unless-stopped
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tilbudsfinder
      POSTGRES_USER: tilbudsfinder
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
