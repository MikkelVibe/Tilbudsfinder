name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tilbudsfinder_test
          POSTGRES_USER: tilbudsfinder
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tilbudsfinder -d tilbudsfinder_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, intl, mbstring, openssl, pcntl, pdo_pgsql, tokenizer, xml, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run PHPUnit
        env:
          APP_ENV: testing
          APP_URL: http://localhost
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: tilbudsfinder_test
          DB_USERNAME: tilbudsfinder
          DB_PASSWORD: secret
          CACHE_STORE: redis
          QUEUE_CONNECTION: redis
          SESSION_DRIVER: array
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SCRAPER_AGENT_VERSION: local
        run: php vendor/bin/phpunit
