name: Deploy VPS

on:
  workflow_run:
    workflows:
      - Publish Image
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p ~/tilbudsfinder/nginx ~/tilbudsfinder/backups'

      - name: Upload deployment files
        run: |
          scp deploy/vps/docker-compose.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/tilbudsfinder/docker-compose.yml"
          scp deploy/vps/nginx/default.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/tilbudsfinder/nginx/default.conf"
          scp deploy/vps/deploy.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/tilbudsfinder/deploy.sh"

      - name: Deploy image
        env:
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "chmod +x ~/tilbudsfinder/deploy.sh && TILBUDSFINDER_IMAGE=ghcr.io/mikkelvibe/tilbudsfinder:${IMAGE_SHA} SCRAPER_AGENT_VERSION=${IMAGE_SHA} ~/tilbudsfinder/deploy.sh"
