services:
  app:
    image: ${TILBUDSFINDER_IMAGE:?Set TILBUDSFINDER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - public-data:/var/www/html/public
    depends_on:
      - postgres
      - redis

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "5080:80"
    volumes:
      - public-data:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    image: ${TILBUDSFINDER_IMAGE:?Set TILBUDSFINDER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    depends_on:
      - postgres
      - redis

  scheduler:
    image: ${TILBUDSFINDER_IMAGE:?Set TILBUDSFINDER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?Set DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups

volumes:
  public-data:
  postgres-data:
  redis-data:
